name: CD — Deploy

on:
  workflow_run:
    workflows: [ "CI — Build and Publish" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/adklsj-development-operations/spring-petclinic:latest

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Deploy container
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
            ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
            docker pull ghcr.io/adklsj-development-operations/spring-petclinic:latest
            docker stop petclinic 2>/dev/null || true
            docker rm petclinic 2>/dev/null || true
            docker run -d \
              --name petclinic \
              --restart unless-stopped \
              -p 8080:8080 \
              ghcr.io/adklsj-development-operations/spring-petclinic:latest
            docker ps --filter name=petclinic
          EOF

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rocket: *Deployed to production* — `${{ github.event.workflow_run.head_sha && 'latest' }}`",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Image", "value": "ghcr.io/adklsj-development-operations/spring-petclinic:latest", "short": false },
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":fire: *Deployment failed*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/ec2_key.pem
